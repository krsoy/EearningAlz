services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: earningalz-backend

    ports:
      - "8000:8000"

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: earningalz-frontend

    ports:
      - "5173:5173"

    environment:
      - VITE_API_URL=http://localhost:8000/earningalz

    depends_on:
      - backend

    restart: unless-stopped